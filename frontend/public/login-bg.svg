<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Pressure curve -->
  <path
    d="M 0 700 C 100 700, 120 400, 200 380 C 280 360, 350 350, 500 340 C 650 330, 800 320, 950 310 C 1100 300, 1200 290, 1440 280"
    fill="none"
    stroke="#38bdf8"
    stroke-opacity="0.12"
    stroke-width="2"
  />

  <!-- Flow curve -->
  <path
    d="M 0 750 C 80 750, 100 550, 180 500 C 260 450, 320 480, 450 500 C 580 520, 700 510, 850 490 C 1000 470, 1150 440, 1440 420"
    fill="none"
    stroke="#a78bfa"
    stroke-opacity="0.12"
    stroke-width="2"
  />

  <!-- Weight curve -->
  <path
    d="M 0 800 C 150 800, 200 780, 300 720 C 400 660, 500 580, 650 500 C 800 420, 950 360, 1100 310 C 1250 260, 1350 230, 1440 210"
    fill="none"
    stroke="#4ade80"
    stroke-opacity="0.12"
    stroke-width="2"
  />

  <!-- Temperature curve -->
  <path
    d="M 0 600 C 100 600, 150 380, 250 350 C 350 320, 500 310, 700 305 C 900 300, 1100 298, 1440 295"
    fill="none"
    stroke="#fb923c"
    stroke-opacity="0.12"
    stroke-width="2"
  />
</svg>
