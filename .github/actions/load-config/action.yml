name: Load config
description: Export selected prod config files into the job environment as flattened key=value pairs.
inputs:
  ci:
    description: Load prod/ci.json.
    default: "false"
  infra:
    description: Load prod/infra.json.
    default: "false"
  backend:
    description: Load prod/backend.json.
    default: "false"
runs:
  using: composite
  steps:
    - name: Load prod/infra.json
      if: inputs.infra == 'true'
      shell: bash
      run: |
        flat=$(jq -c '[paths(scalars) as $p | {([$p[] | tostring] | join("_")): getpath($p)}] | add' config/prod/infra.json)
        echo "$flat" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
        echo "$flat" | jq '.' > infra/terraform.tfvars.json

    - name: Load prod/ci.json
      if: inputs.ci == 'true'
      shell: bash
      run: jq -r '[paths(scalars) as $p | "\([$p[] | tostring] | join("_"))=\(getpath($p))"][]' config/prod/ci.json >> "$GITHUB_ENV"

    - name: Load prod/backend.json
      if: inputs.backend == 'true'
      shell: bash
      run: jq -r '[paths(scalars) as $p | "\([$p[] | tostring] | join("_"))=\(getpath($p))"][]' config/prod/backend.json >> "$GITHUB_ENV"
