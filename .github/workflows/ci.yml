name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options: [all, infra, backend, frontend]

env:
  GCP_PROJECT_ID: decent-visualizer
  GCP_ZONE: us-central1-a

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - infra/**
            backend:
              - backend/**
              - docker-compose.yml
            frontend:
              - frontend/**

  test:
    name: Lint & test
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.backend == 'true'
      - name: Backend lint
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
        working-directory: backend

      # ── Frontend ──
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint, typecheck & test
        if: needs.changes.outputs.frontend == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
        working-directory: frontend

  infra:
    name: Infra
    needs: [changes, test]
    if: |
      needs.changes.outputs.infra == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'infra'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Infisical/secrets-action@v1
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          auth-strategy: oidc
          env-slug: "prod"
          project-slug: "decent-visualizer"
          export-type: env

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8"

      - name: Init
        run: tofu init
        working-directory: infra

      - name: Plan
        run: tofu plan -var-file="terraform.tfvars"
        working-directory: infra

      - name: Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tofu apply -auto-approve -var-file="terraform.tfvars"
        working-directory: infra

  backend:
    name: Deploy backend
    needs: [changes, test, infra]
    if: |
      always() &&
      needs.test.result == 'success' &&
      needs.infra.result != 'failure' &&
      (
        needs.changes.outputs.backend == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'backend'))
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t decent-visualizer-backend \
            -f backend/Dockerfile backend

      - name: Export and upload image
        run: |
          ARCHIVE=$(mktemp -d)/backend-image.tar.gz
          docker save decent-visualizer-backend | gzip > "$ARCHIVE"
          gcloud compute scp --quiet \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --zone="${{ env.GCP_ZONE }}" \
            "$ARCHIVE" "appuser@decent-visualizer:/tmp/backend-image.tar.gz"
          gcloud compute scp --quiet \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --zone="${{ env.GCP_ZONE }}" \
            docker-compose.yml "appuser@decent-visualizer:/opt/app/docker-compose.yml"

      - name: Reload on VM
        run: |
          gcloud compute ssh --quiet \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --zone="${{ env.GCP_ZONE }}" \
            "appuser@decent-visualizer" -- bash -s <<'REMOTE'
          cd /opt/app
          docker load < /tmp/backend-image.tar.gz
          docker compose up -d --remove-orphans
          docker image prune -f
          rm -f /tmp/backend-image.tar.gz
          REMOTE

  frontend:
    name: Deploy frontend
    needs: [changes, test, infra]
    if: |
      always() &&
      needs.test.result == 'success' &&
      needs.infra.result != 'failure' &&
      (
        needs.changes.outputs.frontend == 'true' ||
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'frontend'))
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Infisical/secrets-action@v1
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          auth-strategy: oidc
          env-slug: "prod"
          project-slug: "decent-visualizer"
          export-type: env

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.TF_VAR_backend_url || secrets.BACKEND_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name="decent-visualizer" --branch=main
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.TF_VAR_cloudflare_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.TF_VAR_cloudflare_account_id }}
