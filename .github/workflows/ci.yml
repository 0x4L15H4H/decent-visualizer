name: CI

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options: [all, infra, backend, frontend]

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - backend/**
              - docker-compose.yml
            frontend:
              - frontend/**

  test:
    name: Lint & test
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.backend == 'true'
      - name: Backend lint
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
        working-directory: backend

      # ── Frontend ──
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint, typecheck & test
        if: needs.changes.outputs.frontend == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
        working-directory: frontend

  infra:
    name: Infra
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - name: Load secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: "decent-visualizer"
          export-type: file
          file-output-path: /secrets.env

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8"

      - name: Generate terraform.tfvars.json
        working-directory: infra
        run: |
          keep=$(grep -oE '^variable "[^"]+"' variables.tf | sed -E 's/.*"(.*)"/\1/' \
            | jq -R . | jq -cs 'map({(.):true})|add')
          npx -y @dotenvx/dotenvx get --format json \
            -f ../config.env -f "$GITHUB_WORKSPACE/secrets.env" \
            | jq --argjson keep "$keep" \
              'with_entries(.key |= ascii_downcase) | with_entries(select($keep[.key]))' \
            > terraform.tfvars.json

      - name: Init
        run: tofu init
        working-directory: infra

      - name: Plan
        run: tofu plan
        working-directory: infra

      - name: Apply
        run: tofu apply -auto-approve
        working-directory: infra

  backend:
    name: Deploy backend
    needs: [changes, infra]
    if: |
      needs.changes.outputs.backend == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'backend'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8"

      - name: Render backend env from tofu output
        working-directory: infra
        run: |
          tofu init
          tofu output -json backend_environment \
            | jq -r 'to_entries[] | "\(.key)=\(.value)"' > "$GITHUB_WORKSPACE/backend.env"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t decent-visualizer-backend \
            -f backend/Dockerfile backend

      - name: Upload image and env
        run: |
          ARCHIVE=$(mktemp -d)/backend-image.tar.gz
          docker save decent-visualizer-backend | gzip > "$ARCHIVE"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "$ARCHIVE" "appuser@${project_slug}:/tmp/backend-image.tar.gz"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            docker-compose.yml "appuser@${project_slug}:/opt/app/docker-compose.yml"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            backend.env "appuser@${project_slug}:/opt/app/backend/.env"

      - name: Reload on VM
        run: |
          gcloud compute ssh --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "appuser@${project_slug}" -- bash -s <<'REMOTE'
          cd /opt/app
          docker load < /tmp/backend-image.tar.gz
          docker compose up -d --remove-orphans
          docker image prune -f
          rm -f /tmp/backend-image.tar.gz
          REMOTE

  frontend:
    name: Deploy frontend
    needs: [changes, infra]
    if: |
      needs.changes.outputs.frontend == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'frontend'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: "decent-visualizer"
          export-type: env

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.${{ env.domain }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN: ${{ env.cloudflare_api_token }}
        run: npx wrangler pages deploy dist --project-name="${{ env.project_slug }}" --branch=main
