name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - uses: astral-sh/setup-uv@v5
      - name: Backend lint, typecheck & test
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright
          uv run pytest
        working-directory: backend

      # ── Frontend ──
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint, typecheck & test
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
        working-directory: frontend

  infra:
    name: Infra
    needs: test
    runs-on: ubuntu-latest
    outputs:
      supabase_project_ref: ${{ steps.tofu-output.outputs.supabase_project_ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12"

      - name: Mint Infisical OIDC token for Terraform
        uses: actions/github-script@v7
        with:
          script: |
            // The Infisical Terraform provider authenticates with a GitHub OIDC
            // token read from INFISICAL_AUTH_JWT. Its audience must be the GitHub
            // owner URL, matching the machine identity's OIDC configuration.
            const token = await core.getIDToken(`https://github.com/${context.repo.owner}`)
            core.setSecret(token)
            core.exportVariable('INFISICAL_AUTH_JWT', token)

      - name: Init
        run: tofu init
        working-directory: infra

      - name: Plan
        run: tofu plan
        working-directory: infra

      - name: Apply
        run: tofu apply -auto-approve
        working-directory: infra

      - name: Export outputs
        id: tofu-output
        run: echo "supabase_project_ref=$(tofu output -raw supabase_project_ref)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  migrate:
    name: Run migrations
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_deploy_project_slug }}
          secret-path: "/deploy"
          export-type: env

      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Push migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.supabase_admin_token }}
          SUPABASE_PROJECT_REF: ${{ needs.infra.outputs.supabase_project_ref }}

  vm:
    name: Deploy VM
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t decent-visualizer-backend \
            -f backend/Dockerfile .

      - name: Upload image
        run: |
          ARCHIVE=$(mktemp -d)/backend-image.tar.gz
          docker save decent-visualizer-backend | gzip > "$ARCHIVE"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "$ARCHIVE" "appuser@${project_slug}:/tmp/backend-image.tar.gz"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            docker-compose.yml "appuser@${project_slug}:/opt/app/docker-compose.yml"

      - name: Reload on VM
        run: |
          gcloud compute ssh --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "appuser@${project_slug}" -- bash -s <<'REMOTE'
          cd /opt/app
          docker load < /tmp/backend-image.tar.gz
          docker compose up -d --remove-orphans
          docker image prune -f
          rm -f /tmp/backend-image.tar.gz
          REMOTE

  frontend:
    name: Deploy frontend
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_deploy_project_slug }}
          secret-path: "/deploy"
          export-type: env

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.${{ env.domain }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN: ${{ env.cloudflare_api_token }}
        run: npx wrangler pages deploy dist --project-name="${{ env.cloudflare_pages_project }}" --branch=main
