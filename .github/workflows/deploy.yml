name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - infra/**
              - config.env
            backend:
              - backend/**
              - docker-compose.yml
              - config.env
            frontend:
              - frontend/**
              - config.env

  test:
    name: Lint & test
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.backend == 'true'
      - name: Backend lint
        if: needs.changes.outputs.backend == 'true'
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
        working-directory: backend

      # ── Frontend ──
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint, typecheck & test
        if: needs.changes.outputs.frontend == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
        working-directory: frontend

  infra:
    name: Infra
    needs: [changes, test]
    if: ${{ needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12"

      - name: Generate terraform.tfvars.json
        working-directory: infra
        run: |
          # config.env holds the non-secret variables, with keys that already
          # match the names in variables.tf. Secrets are read straight from
          # Infisical by the providers, so they don't appear here.
          npx -y @dotenvx/dotenvx get --format json -f ../config.env \
            > "$RUNNER_TEMP/config.json"

          # Collect the names of the variables declared in variables.tf.
          grep -oE '^variable "[^"]+"' variables.tf \
            | sed -E 's/.*"(.*)"/\1/' > "$RUNNER_TEMP/declared.txt"

          # Turn that list into a lookup object, e.g. {"domain": true, ...}.
          declared=$(jq -Rn '[inputs] | map({(.): true}) | add' "$RUNNER_TEMP/declared.txt")

          # Keep only the keys that are declared variables. Terraform warns about
          # any tfvars key it doesn't recognize, so this drops the config.env
          # entries (e.g. infisical_project_slug) that aren't variables.
          jq --argjson declared "$declared" \
            'with_entries(select($declared[.key]))' \
            "$RUNNER_TEMP/config.json" > terraform.tfvars.json

      - name: Mint Infisical OIDC token for Terraform
        uses: actions/github-script@v7
        with:
          script: |
            // The Infisical Terraform provider authenticates with a GitHub OIDC
            // token read from INFISICAL_AUTH_JWT. Its audience must be the GitHub
            // owner URL, matching the machine identity's OIDC configuration.
            const token = await core.getIDToken(`https://github.com/${context.repo.owner}`)
            core.setSecret(token)
            core.exportVariable('INFISICAL_AUTH_JWT', token)

      - name: Init
        run: tofu init
        working-directory: infra

      - name: Plan
        run: tofu plan
        working-directory: infra

      - name: Apply
        run: tofu apply -auto-approve
        working-directory: infra

  backend:
    name: Deploy backend
    needs: [changes, test, infra]
    if: ${{ always() && needs.test.result == 'success' && needs.infra.result != 'failure' && needs.infra.result != 'cancelled' && needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t decent-visualizer-backend \
            -f backend/Dockerfile .

      - name: Upload image
        run: |
          ARCHIVE=$(mktemp -d)/backend-image.tar.gz
          docker save decent-visualizer-backend | gzip > "$ARCHIVE"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "$ARCHIVE" "appuser@${project_slug}:/tmp/backend-image.tar.gz"
          gcloud compute scp --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            docker-compose.yml "appuser@${project_slug}:/opt/app/docker-compose.yml"

      - name: Reload on VM
        run: |
          gcloud compute ssh --quiet \
            --project="$gcp_project_id" --zone="$gcp_zone" \
            "appuser@${project_slug}" -- bash -s <<'REMOTE'
          cd /opt/app
          docker load < /tmp/backend-image.tar.gz
          docker compose up -d --remove-orphans
          docker image prune -f
          rm -f /tmp/backend-image.tar.gz
          REMOTE

  frontend:
    name: Deploy frontend
    needs: [changes, test, infra]
    if: ${{ always() && needs.test.result == 'success' && needs.infra.result != 'failure' && needs.infra.result != 'cancelled' && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_project_slug }}
          secret-path: "/deploy"
          export-type: env

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.${{ env.domain }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN: ${{ env.cloudflare_api_token }}
        run: npx wrangler pages deploy dist --project-name="${{ env.cloudflare_pages_project }}" --branch=main
