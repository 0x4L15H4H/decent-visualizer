name: CI / Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - uses: astral-sh/setup-uv@v5
      - name: Backend lint, typecheck & test
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright
          uv run pytest
        working-directory: backend

      # ── Frontend ──
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint, typecheck & test
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
        working-directory: frontend

  infra:
    name: Infra
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      supabase_project_ref: ${{ steps.tofu-output.outputs.supabase_project_ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12"

      - name: Mint Infisical OIDC token for Terraform
        uses: actions/github-script@v7
        with:
          script: |
            // The Infisical Terraform provider authenticates with a GitHub OIDC
            // token read from INFISICAL_AUTH_JWT. Its audience must be the GitHub
            // owner URL, matching the machine identity's OIDC configuration.
            const token = await core.getIDToken(`https://github.com/${context.repo.owner}`)
            core.setSecret(token)
            core.exportVariable('INFISICAL_AUTH_JWT', token)

      - name: Init
        run: tofu init
        working-directory: infra

      - name: Plan
        run: tofu plan
        working-directory: infra

      - name: Apply
        run: tofu apply -auto-approve
        working-directory: infra

      - name: Export outputs
        id: tofu-output
        run: |
          echo "supabase_project_ref=$(tofu output -raw supabase_project_ref)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  migrate:
    name: Run migrations
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_deploy_project_slug }}
          secret-path: "/deploy"
          export-type: env

      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Push migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.supabase_admin_token }}
          SUPABASE_PROJECT_REF: ${{ needs.infra.outputs.supabase_project_ref }}

  vm:
    name: Deploy external VM
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_deploy_project_slug }}
          secret-path: "/deploy"
          export-type: env

      # Terraform state remains in GCS during the reversible cutover, and is
      # read here solely to obtain the current Cloudflare tunnel token.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.gcp_workflow_identity_provider }}
          service_account: ${{ env.gcp_service_account }}

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12"

      - name: Read Cloudflare tunnel token
        run: |
          tofu init
          tunnel_token="$(tofu output -raw cloudflare_tunnel_token)"
          echo "::add-mask::$tunnel_token"
          echo "CLOUDFLARED_TOKEN=$tunnel_token" >> "$GITHUB_ENV"
        working-directory: infra

      - name: Prepare deployment credentials
        run: |
          key_path="$RUNNER_TEMP/oci_deploy_ed25519"
          printf '%s\n' "$oci_ssh_private_key" > "$key_path"
          chmod 600 "$key_path"
          echo "OCI_SSH_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Set up QEMU for ARM64 builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --platform linux/arm64 \
            -t decent-visualizer-backend \
            -f backend/Dockerfile .

      - name: Upload image
        run: |
          ARCHIVE=$(mktemp -d)/backend-image.tar.gz
          docker save decent-visualizer-backend | gzip > "$ARCHIVE"
          runtime_env=$(mktemp)
          : "${infisical_backend_client_id:?Missing /deploy infisical_backend_client_id}"
          : "${infisical_backend_client_secret:?Missing /deploy infisical_backend_client_secret}"
          {
            printf 'INFISICAL_CLIENT_ID=%s\n' "$infisical_backend_client_id"
            printf 'INFISICAL_CLIENT_SECRET=%s\n' "$infisical_backend_client_secret"
            printf 'CLOUDFLARED_TOKEN=%s\n' "$CLOUDFLARED_TOKEN"
          } > "$runtime_env"
          host="$external_vm_host"
          user="$external_vm_ssh_user"
          for _ in {1..60}; do
            if ssh -i "$OCI_SSH_KEY" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" true; then break; fi
            sleep 10
          done
          ssh -i "$OCI_SSH_KEY" -o BatchMode=yes "$user@$host" 'sudo install -d -o "$(id -un)" -g "$(id -gn)" /opt/decent-visualizer && docker info >/dev/null'
          scp -i "$OCI_SSH_KEY" -o BatchMode=yes "$ARCHIVE" "$user@$host:/tmp/backend-image.tar.gz"
          scp -i "$OCI_SSH_KEY" -o BatchMode=yes docker-compose.yml "$user@$host:/tmp/docker-compose.yml"
          scp -i "$OCI_SSH_KEY" -o BatchMode=yes "$runtime_env" "$user@$host:/tmp/runtime.env"

      - name: Reload on VM
        run: |
          host="$external_vm_host"
          user="$external_vm_ssh_user"
          ssh -i "$OCI_SSH_KEY" -o BatchMode=yes "$user@$host" bash -s <<'REMOTE'
          cd /opt/decent-visualizer
          install -m 644 /tmp/docker-compose.yml docker-compose.yml
          install -m 600 /tmp/runtime.env runtime.env
          docker load < /tmp/backend-image.tar.gz
          docker compose --env-file runtime.env up -d --remove-orphans
          docker image prune -f
          rm -f /tmp/backend-image.tar.gz /tmp/docker-compose.yml /tmp/runtime.env
          REMOTE

  frontend:
    name: Deploy frontend
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-config
        with:
          ci: "true"
          infra: "true"

      - uses: Infisical/secrets-action@v1.0.16
        with:
          identity-id: ${{ env.infisical_deploy_identity_id }}
          method: oidc
          env-slug: "prod"
          project-slug: ${{ env.infisical_deploy_project_slug }}
          secret-path: "/deploy"
          export-type: env

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.${{ env.domain }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN: ${{ env.cloudflare_api_token }}
        run: npx wrangler pages deploy dist --project-name="${{ env.cloudflare_pages_project }}" --branch=main
