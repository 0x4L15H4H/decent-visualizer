# Decent Visualizer Backend
#
# Usage on the VM:
#   docker compose up -d
#   docker compose logs -f backend

services:
  backend:
    image: decent-visualizer-backend:latest
    ports:
      - "127.0.0.1:80:8000"
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
      - "metadata:169.254.169.254"
    logging:
      driver: gcplogs
    restart: unless-stopped
