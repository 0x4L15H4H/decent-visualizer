# Decent Visualizer Backend
#
# Usage on the VM:
#   docker compose up -d
#   docker compose logs -f backend

services:
  backend:
    image: decent-visualizer-backend:latest
    expose:
      - "8000"
    env_file:
      - /opt/decent-visualizer/runtime.env
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN is required}
    environment:
      CLOUDFLARED_TOKEN: ${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN is required}
    depends_on:
      - backend
    restart: unless-stopped
