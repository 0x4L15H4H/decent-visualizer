# Decent Visualizer Backend
#
# Usage on the VM:
#   docker compose up -d
#   docker compose logs -f backend

services:
  backend:
    build: ./backend
    # Bound to loopback only — reached via the Cloudflare Tunnel (cloudflared
    # runs on the host and connects to localhost:80). No public exposure.
    ports:
      - "127.0.0.1:80:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
